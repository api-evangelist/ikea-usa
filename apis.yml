aid: ikea-usa
name: IKEA U.S.
kind: company
description: >-
  IKEA U.S. is the United States retail operation of IKEA, run by Ingka Group,
  the largest IKEA franchisee. The U.S. business operates ~50+ full-service
  stores, ~40+ Plan & Order Points, and ~80+ pick-up locations across the
  country, alongside the ikea.com/us e-commerce site and the IKEA mobile app.
  Inter IKEA Systems B.V. separately owns the IKEA Concept and brand. IKEA
  U.S. offers home furnishings, kitchens, appliances, lighting, the IKEA
  Family loyalty program, the IKEA Business Network for B2B customers, home
  delivery and Click & Collect, design and planning services, the Buy Back &
  Resell program, and IKEA Home smart products controlled via the IKEA Home
  smart and IKEA Home smart 1 apps. IKEA U.S. does not publish a public
  developer API; supplier and trading-partner integrations are handled
  through IKEA's vendor systems and Ingka Group's internal digital platforms.
